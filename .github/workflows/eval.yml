name: RAG Evaluation

on:
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - 'eval/**'

  workflow_dispatch:
    inputs:
      max_questions:
        description: 'Max number of questions to evaluate (blank = all)'
        required: false
        default: ''

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-eval-${{ hashFiles('eval/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-eval-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r eval/requirements.txt

      - name: Run RAG evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          cd eval
          if [ -n "${{ github.event.inputs.max_questions }}" ]; then
            python run_eval.py ${{ github.event.inputs.max_questions }}
          else
            python run_eval.py
          fi

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report-${{ github.sha }}
          path: eval/reports/
          retention-days: 30

      - name: Post evaluation summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportsDir = 'eval/reports';

            if (!fs.existsSync(reportsDir)) {
              console.log('No reports directory found');
              return;
            }

            const files = fs.readdirSync(reportsDir).filter(f => f.endsWith('.md'));
            if (files.length === 0) {
              console.log('No report files found');
              return;
            }

            const latestReport = files.sort().pop();
            const content = fs.readFileSync(path.join(reportsDir, latestReport), 'utf8');

            // Extract just the aggregate scores table
            const tableMatch = content.match(/## Aggregate Scores\n\n([\s\S]*?)(?=\n##)/);
            const summary = tableMatch ? tableMatch[1] : 'Report generated but could not extract summary.';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## RAG Evaluation Results\n\n${summary}\n\n[Full report attached as artifact](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
